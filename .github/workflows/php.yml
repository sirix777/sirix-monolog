name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3", "8.4", "8.5"]
        redaction-version: ["^1.3.1", "^2.0"]

    name: PHP ${{ matrix.php-version }} / sirix/redaction ${{ matrix.redaction-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-lock

      - name: Install dependencies
        run: composer update sirix/redaction --with "sirix/redaction:${{ matrix.redaction-version }}" --prefer-dist --no-progress --ignore-platform-req=ext-mongodb

      - name: Install tools
        run: composer bin all install --prefer-dist --no-progress

      - name: Run checks
        run: composer check
